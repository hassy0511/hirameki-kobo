<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#161b47">
  <meta name="description" content="足し算で空のまちを修理する、小学1年生向け学習ゲーム">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>ひらめき工房と そらのまち</title>
  <style>
    :root {
      --night: #10143c;
      --indigo: #1a2255;
      --panel: #232c64;
      --panel-soft: #303a79;
      --paper: #fffaf0;
      --ink: #202449;
      --muted: #646985;
      --sky: #65dfde;
      --sky-deep: #30b7ca;
      --lemon: #ffd866;
      --coral: #ff826e;
      --mint: #70e5b0;
      --lavender: #a99cff;
      --line: rgba(255,255,255,.18);
      --shadow: 0 18px 45px rgba(5,8,31,.32);
      --radius-xl: 30px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --safe-top: max(14px, env(safe-area-inset-top));
      --safe-bottom: max(14px, env(safe-area-inset-bottom));
    }

    * { box-sizing: border-box; }
    html { min-height: 100%; background: var(--night); }
    body {
      margin: 0;
      min-height: 100vh;
      color: #fff;
      background:
        radial-gradient(circle at 15% 10%, rgba(101,223,222,.16), transparent 31rem),
        radial-gradient(circle at 88% 28%, rgba(169,156,255,.16), transparent 28rem),
        linear-gradient(155deg, #0d1136 0%, #18204f 54%, #11163f 100%);
      font-family: "Hiragino Maru Gothic ProN", "Yu Gothic", "BIZ UDPGothic", system-ui, sans-serif;
      font-weight: 700;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .45;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.75) 0 1px, transparent 1.5px),
        radial-gradient(circle, rgba(255,216,102,.55) 0 1px, transparent 1.5px);
      background-position: 12px 18px, 68px 74px;
      background-size: 94px 94px, 137px 137px;
      mask-image: linear-gradient(to bottom, #000, transparent 72%);
    }

    button, input { font: inherit; }
    button {
      border: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    button:focus-visible, input:focus-visible {
      outline: 4px solid var(--lemon);
      outline-offset: 3px;
    }
    button:disabled { cursor: not-allowed; }
    svg { display: block; }
    h1, h2, h3, p { margin-top: 0; }

    .app-shell { min-height: 100vh; position: relative; z-index: 1; }
    .screen {
      width: min(1220px, 100%);
      margin: 0 auto;
      padding: var(--safe-top) clamp(14px, 3vw, 34px) calc(var(--safe-bottom) + 22px);
      animation: screenIn .34s ease both;
    }
    @keyframes screenIn { from { opacity: 0; transform: translateY(8px); } }

    .topbar {
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }
    .brand-button {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #fff;
      background: transparent;
      padding: 4px;
      text-align: left;
    }
    .brand-mark {
      width: 46px;
      height: 46px;
      border-radius: 15px;
      display: grid;
      place-items: center;
      color: var(--ink);
      background: linear-gradient(145deg, var(--lemon), #fff0a7);
      box-shadow: 0 8px 20px rgba(255,216,102,.22), inset 0 -3px 0 rgba(162,111,0,.16);
      font-size: 27px;
    }
    .brand-name { display: block; font-size: clamp(16px, 2.2vw, 21px); line-height: 1.05; }
    .brand-sub { display: block; margin-top: 4px; color: #b8c0ed; font-size: 11px; letter-spacing: .08em; }
    .top-actions { display: flex; align-items: center; gap: 8px; }
    .light-pill, .icon-button {
      min-height: 46px;
      border-radius: 15px;
      color: #fff;
      background: rgba(255,255,255,.1);
      border: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }
    .light-pill { display: flex; align-items: center; gap: 8px; padding: 0 15px; }
    .light-pill strong { color: var(--lemon); font-size: 18px; }
    .icon-button { width: 46px; padding: 0; display: grid; place-items: center; font-size: 20px; }
    .icon-button:hover { background: rgba(255,255,255,.17); }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--sky);
      font-size: 13px;
      letter-spacing: .1em;
      margin-bottom: 10px;
    }
    .eyebrow::before { content: ""; width: 22px; height: 3px; border-radius: 9px; background: currentColor; }
    .page-heading { margin-bottom: 22px; }
    .page-heading h1 { margin-bottom: 7px; font-size: clamp(25px, 4vw, 40px); line-height: 1.2; }
    .page-heading p { color: #c6ccef; line-height: 1.75; margin-bottom: 0; }

    .primary-button, .secondary-button, .soft-button, .danger-button {
      min-height: 56px;
      border-radius: 17px;
      padding: 0 22px;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 9px;
      font-size: 16px;
      transition: transform .15s ease, filter .15s ease, background .15s ease;
    }
    .primary-button {
      color: var(--ink);
      background: linear-gradient(145deg, var(--lemon), #ffe99a);
      box-shadow: 0 10px 0 #b4771c, 0 18px 28px rgba(0,0,0,.22);
      margin-bottom: 10px;
    }
    .primary-button:hover { filter: brightness(1.05); transform: translateY(-2px); }
    .primary-button:active { transform: translateY(5px); box-shadow: 0 5px 0 #b4771c; }
    .secondary-button {
      color: #fff;
      background: var(--panel-soft);
      border: 1px solid rgba(255,255,255,.17);
    }
    .secondary-button:hover, .soft-button:hover { background: #3b478c; transform: translateY(-1px); }
    .soft-button { color: var(--ink); background: #e9ecf7; min-height: 48px; }
    .danger-button { color: #fff; background: #b63f54; }
    .wide { width: 100%; }

    .home-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(300px, .65fr);
      gap: clamp(18px, 3vw, 32px);
      align-items: stretch;
    }
    .world-card {
      min-height: 560px;
      border-radius: var(--radius-xl);
      overflow: hidden;
      position: relative;
      background:
        radial-gradient(circle at 50% 30%, rgba(101,223,222,.17), transparent 48%),
        linear-gradient(165deg, #202b6c, #11163d 78%);
      border: 1px solid rgba(255,255,255,.13);
      box-shadow: var(--shadow);
    }
    .world-card::after {
      content: "";
      position: absolute;
      inset: auto -20% -45% -20%;
      height: 70%;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(101,223,222,.14), transparent 65%);
      pointer-events: none;
    }
    .world-copy {
      position: absolute;
      z-index: 3;
      top: clamp(22px, 4vw, 42px);
      left: clamp(22px, 4vw, 42px);
      max-width: 440px;
    }
    .world-copy h1 { font-size: clamp(31px, 5vw, 58px); line-height: 1.1; margin-bottom: 13px; letter-spacing: -.03em; }
    .world-copy h1 span { color: var(--lemon); }
    .world-copy p { color: #d6dbf6; line-height: 1.7; max-width: 37em; }
    .world-scene { position: absolute; inset: 135px 0 -8px; display: grid; place-items: end center; }
    .world-scene svg { width: min(700px, 96%); height: auto; }
    .city-window { fill: #30385e; transition: fill .4s ease, filter .4s ease; }
    .city-window.is-lit { fill: var(--lemon); filter: drop-shadow(0 0 8px rgba(255,216,102,.9)); }
    .float-slow { animation: float 4.8s ease-in-out infinite; transform-origin: center; }
    .float-delay { animation: float 5.7s 1s ease-in-out infinite; transform-origin: center; }
    @keyframes float { 50% { transform: translateY(-7px); } }

    .home-side { display: flex; flex-direction: column; gap: 16px; }
    .mission-card, .character-card, .paper-card {
      border-radius: var(--radius-lg);
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.15);
      box-shadow: var(--shadow);
      backdrop-filter: blur(15px);
    }
    .mission-card { padding: 25px; }
    .mission-card h2 { font-size: 25px; margin-bottom: 7px; }
    .mission-card p { color: #c8ceef; line-height: 1.6; font-size: 14px; }
    .mission-meter { display: flex; gap: 6px; margin: 18px 0 20px; }
    .mission-meter i { height: 9px; flex: 1; border-radius: 9px; background: rgba(255,255,255,.13); }
    .mission-meter i.on { background: var(--lemon); box-shadow: 0 0 12px rgba(255,216,102,.55); }
    .home-buttons { display: grid; gap: 10px; }
    .character-card { min-height: 170px; padding: 16px; display: grid; grid-template-columns: 116px 1fr; align-items: center; gap: 10px; }
    .character-card svg { width: 115px; max-height: 140px; }
    .speech-small { position: relative; padding: 15px; border-radius: 16px; color: var(--ink); background: var(--paper); line-height: 1.55; font-size: 14px; }
    .speech-small::before { content: ""; position: absolute; left: -10px; top: 40%; border: 10px solid transparent; border-right-color: var(--paper); border-left: 0; }
    .home-links { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .home-links button { min-height: 56px; border-radius: 17px; background: rgba(255,255,255,.08); color: #fff; border: 1px solid var(--line); }
    .home-links button:hover { background: rgba(255,255,255,.15); }

    .blueprint-board {
      position: relative;
      padding: clamp(18px, 3vw, 30px);
      border-radius: var(--radius-xl);
      color: var(--ink);
      background-color: #edf7f2;
      background-image:
        linear-gradient(rgba(61,119,135,.09) 1px, transparent 1px),
        linear-gradient(90deg, rgba(61,119,135,.09) 1px, transparent 1px);
      background-size: 24px 24px;
      border: 8px solid #b8783e;
      box-shadow: inset 0 0 0 3px #e6b56d, var(--shadow);
    }
    .blueprint-board::before, .blueprint-board::after {
      content: ""; position: absolute; width: 24px; height: 24px; border-radius: 50%; background: #82502f; box-shadow: inset 0 4px 0 rgba(255,255,255,.18);
    }
    .blueprint-board::before { top: 10px; left: 10px; }
    .blueprint-board::after { right: 10px; bottom: 10px; }
    .zone-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
    .zone-panel {
      min-width: 0;
      padding: 18px;
      border-radius: 21px;
      background: rgba(255,255,255,.78);
      border: 2px dashed rgba(45,94,114,.25);
    }
    .zone-label { display: flex; align-items: center; gap: 9px; margin-bottom: 14px; color: #30576b; font-size: 14px; }
    .zone-label b { min-width: 28px; height: 28px; border-radius: 9px; display: grid; place-items: center; color: #fff; background: #30576b; }
    .stage-list { display: grid; gap: 10px; }
    .stage-tile {
      width: 100%; min-height: 105px; padding: 12px;
      display: grid; grid-template-columns: 48px 1fr auto; gap: 11px; align-items: center;
      text-align: left; color: var(--ink); background: #fff; border: 2px solid #dbe9e7; border-radius: 17px;
      box-shadow: 0 5px 0 rgba(64,99,100,.13);
      transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease;
    }
    .stage-tile:not(:disabled):hover { transform: translateY(-3px); border-color: var(--stage-color); box-shadow: 0 8px 0 color-mix(in srgb, var(--stage-color) 35%, transparent); }
    .stage-tile.current { border-color: var(--stage-color); background: color-mix(in srgb, var(--stage-color) 8%, white); }
    .stage-tile.cleared .stage-number { background: var(--stage-color); color: var(--ink); }
    .stage-tile:disabled { opacity: .46; filter: grayscale(.35); }
    .stage-number { width: 48px; height: 48px; border-radius: 16px; display: grid; place-items: center; color: #fff; background: #4d5774; font-size: 20px; }
    .stage-text { min-width: 0; }
    .stage-text strong { display: block; font-size: 15px; line-height: 1.35; margin-bottom: 5px; }
    .stage-text small { display: block; color: var(--muted); font-size: 11px; line-height: 1.4; }
    .stage-marks { min-width: 34px; color: #b4a371; font-size: 12px; text-align: right; line-height: 1.2; }
    .stage-marks .earned { color: #e5a900; }
    .blueprint-legend { display: flex; justify-content: space-between; gap: 15px; margin-top: 18px; padding: 13px 16px; border-radius: 14px; color: #466171; background: rgba(255,255,255,.72); font-size: 12px; }

    .game-shell { max-width: 1100px; margin: 0 auto; }
    .mission-head {
      display: grid; grid-template-columns: minmax(180px, 1fr) minmax(260px, 1.5fr) auto; gap: 14px; align-items: center;
      margin-bottom: 17px;
    }
    .mission-title small { color: var(--sky); font-size: 11px; letter-spacing: .1em; }
    .mission-title strong { display: block; font-size: clamp(16px, 2.4vw, 22px); margin-top: 3px; }
    .charge-wrap { display: flex; align-items: center; gap: 11px; }
    .charge-track { height: 16px; flex: 1; padding: 3px; border-radius: 12px; background: rgba(255,255,255,.11); border: 1px solid rgba(255,255,255,.1); }
    .charge-fill { height: 100%; border-radius: 8px; background: linear-gradient(90deg, var(--sky), var(--lemon)); box-shadow: 0 0 14px rgba(101,223,222,.5); transition: width .45s ease; }
    .charge-label { color: #d6dcf8; font-size: 12px; white-space: nowrap; }
    .mission-dots { display: flex; gap: 5px; }
    .mission-dots i { width: 9px; height: 9px; border-radius: 50%; background: rgba(255,255,255,.15); }
    .mission-dots i.done { background: var(--sky); }
    .mission-dots i.now { background: var(--lemon); box-shadow: 0 0 9px var(--lemon); }
    .quit-button { min-width: 48px; min-height: 48px; border-radius: 15px; color: #fff; background: rgba(255,255,255,.1); border: 1px solid var(--line); }

    .game-layout { display: grid; grid-template-columns: minmax(280px, .76fr) minmax(430px, 1.24fr); gap: 18px; align-items: stretch; }
    .repair-stage {
      min-height: 570px; position: relative; overflow: hidden; border-radius: var(--radius-xl);
      background:
        radial-gradient(circle at 50% 26%, color-mix(in srgb, var(--stage-color) 26%, transparent), transparent 43%),
        linear-gradient(170deg, #252f70, #121741 80%);
      border: 1px solid rgba(255,255,255,.14); box-shadow: var(--shadow);
    }
    .repair-stage::before { content: ""; position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px); background-size: 28px 28px; }
    .machine-scene { position: absolute; inset: 35px 18px 135px; display: grid; place-items: center; }
    .machine-scene svg { width: 100%; max-height: 390px; filter: drop-shadow(0 22px 22px rgba(0,0,0,.25)); }
    .machine-core { fill: #30385e; transition: fill .4s ease, filter .4s ease; }
    .machine-core.on { fill: var(--lemon); filter: drop-shadow(0 0 12px var(--lemon)); }
    .repair-character { position: absolute; left: 14px; bottom: 10px; width: 116px; z-index: 2; }
    .repair-character svg { width: 100%; }
    .repair-status {
      position: absolute; right: 18px; bottom: 25px; left: 128px; z-index: 2;
      min-height: 86px; padding: 14px 15px; border-radius: 17px; color: var(--ink); background: var(--paper); line-height: 1.5; font-size: 13px;
    }
    .repair-status::before { content: ""; position: absolute; left: -11px; bottom: 28px; border: 11px solid transparent; border-right-color: var(--paper); border-left: 0; }
    .chain-badge { display: inline-flex; gap: 5px; align-items: center; margin-top: 7px; padding: 5px 9px; border-radius: 10px; color: #725000; background: #fff1b3; font-size: 11px; }

    .question-panel {
      min-height: 570px; padding: clamp(20px, 3vw, 32px); border-radius: var(--radius-xl); color: var(--ink); background: var(--paper); box-shadow: var(--shadow); display: flex; flex-direction: column;
    }
    .question-count { color: #747995; font-size: 12px; letter-spacing: .08em; margin-bottom: 10px; }
    .question-panel h1 { font-size: clamp(21px, 3.4vw, 31px); line-height: 1.45; margin-bottom: 12px; }
    .equation { min-height: 62px; display: flex; align-items: center; justify-content: center; gap: 10px; margin: 8px 0 16px; font-family: ui-rounded, "Hiragino Maru Gothic ProN", sans-serif; font-size: clamp(34px, 6vw, 60px); font-weight: 900; letter-spacing: .04em; color: #283066; }
    .visual-box { min-height: 118px; margin-bottom: 16px; padding: 16px; border-radius: 20px; display: grid; place-items: center; background: #eef4f0; border: 2px solid #dce9e4; }
    .object-groups { display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 18px; }
    .object-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 7px; max-width: 230px; padding: 9px; border-radius: 15px; background: rgba(255,255,255,.7); }
    .object-dot { width: 27px; height: 27px; border-radius: 10px 50% 50% 50%; transform: rotate(45deg); background: var(--dot-color, var(--sky)); box-shadow: inset -3px -3px 0 rgba(0,0,0,.12), 0 3px 7px rgba(34,77,84,.15); }
    .object-plus { color: #6a718d; font-size: 30px; }
    .slot-grid { display: grid; grid-template-columns: repeat(5, 34px); gap: 7px; }
    .slot-grid.wide { grid-template-columns: repeat(10, 30px); width: auto; }
    .slot { width: 34px; height: 34px; border-radius: 10px; background: #fff; border: 2px dashed #afbac4; }
    .slot-grid.wide .slot { width: 30px; height: 30px; }
    .slot.filled { border-style: solid; border-color: #28a9b9; background: var(--sky); box-shadow: inset 0 -4px 0 rgba(0,0,0,.08); }
    .tenframe-wrap { display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 13px; }
    .ten-label { color: #536176; font-size: 13px; text-align: center; margin-top: 7px; }
    .carry-visual { width: 100%; }
    .carry-line { display: flex; align-items: center; justify-content: center; gap: 12px; flex-wrap: wrap; }
    .carry-box { min-width: 90px; padding: 10px; border-radius: 15px; text-align: center; background: #fff; border: 2px solid #d4e0df; }
    .carry-box strong { display: block; color: #283066; font-size: 25px; }
    .carry-arrow { color: #78809a; font-size: 23px; }
    .story-strip { display: grid; grid-template-columns: 92px 1fr; align-items: center; gap: 15px; width: 100%; }
    .story-strip svg { width: 92px; }
    .story-strip p { margin: 0; color: #45506f; line-height: 1.7; font-size: 15px; }

    .answers { margin-top: auto; }
    .answer-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 11px; }
    .answer-button {
      min-height: 72px; border-radius: 18px; color: #27305f; background: #fff; border: 3px solid #dde4e5; box-shadow: 0 6px 0 #c8d1d4; font-size: 27px; font-weight: 900;
      transition: transform .14s ease, border-color .14s ease, box-shadow .14s ease;
    }
    .answer-button:hover { transform: translateY(-2px); border-color: var(--stage-color); box-shadow: 0 8px 0 color-mix(in srgb, var(--stage-color) 38%, #c8d1d4); }
    .answer-button:active { transform: translateY(4px); box-shadow: 0 2px 0 #c8d1d4; }
    .number-display { height: 70px; display: grid; place-items: center; margin-bottom: 11px; border-radius: 18px; color: #27305f; background: #fff; border: 3px solid #dce5e4; font-size: 38px; }
    .number-display.empty { color: #aab1bd; font-size: 18px; }
    .keypad { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
    .keypad button { min-height: 54px; border-radius: 14px; color: #27305f; background: #e8efee; font-size: 22px; box-shadow: inset 0 -3px 0 rgba(54,81,87,.13); }
    .keypad .submit-key { grid-column: span 2; color: var(--ink); background: var(--lemon); font-size: 15px; }
    .circuit-grid { display: grid; gap: 9px; }
    .circuit-button {
      min-height: 64px; padding: 9px 15px; display: grid; grid-template-columns: 40px 1fr 50px; align-items: center; gap: 10px; border-radius: 16px; color: #26305f; background: #e8eeee; border: 2px solid #d4dedd; font-size: 23px;
    }
    .circuit-button:hover { border-color: var(--stage-color); background: #fff; }
    .circuit-node { width: 30px; height: 30px; border: 6px solid #7d8b9a; border-radius: 50%; background: #fff; }
    .circuit-wire { height: 8px; border-radius: 8px; background: repeating-linear-gradient(90deg, #8a96a4 0 12px, transparent 12px 18px); }
    .inline-hint { margin: 0 0 13px; padding: 11px 13px; border-radius: 13px; color: #725000; background: #fff0b7; font-size: 13px; line-height: 1.55; }

    .feedback-card { margin-top: auto; padding: 18px; border-radius: 20px; animation: popIn .25s ease both; }
    @keyframes popIn { from { opacity: 0; transform: scale(.96); } }
    .feedback-card.correct, .feedback-card.recovered { color: #164d45; background: #d9f8e9; border: 2px solid #86d9bb; }
    .feedback-card.hint { color: #694c00; background: #fff1bd; border: 2px solid #ebcc64; }
    .feedback-card.miss { color: #663743; background: #ffe0e0; border: 2px solid #efaaa8; }
    .feedback-card h2 { margin-bottom: 7px; font-size: 22px; }
    .feedback-card p { margin-bottom: 14px; line-height: 1.55; font-size: 14px; }
    .feedback-card button { min-height: 50px; width: 100%; border-radius: 14px; color: var(--ink); background: #fff; border: 2px solid currentColor; }

    .result-wrap { max-width: 860px; margin: 30px auto 0; }
    .result-card { position: relative; overflow: hidden; padding: clamp(26px, 5vw, 52px); border-radius: var(--radius-xl); text-align: center; color: var(--ink); background: var(--paper); box-shadow: var(--shadow); }
    .result-card::before { content: ""; position: absolute; inset: 0 0 auto; height: 9px; background: linear-gradient(90deg, var(--sky), var(--lemon), var(--coral), var(--lavender)); }

    const STAGES = [
      { id:'garden', n:1, zone:0, name:'ほしつぶの にわ', skill:'10までを かぞえる', part:'かぞえのレンズ', color:'#65dfde', symbol:'◉', intro:'ひかりつぶを かぞえて、にわの あかりを もどそう。' },
      { id:'pairs', n:2, zone:0, name:'ふたつの かけら', skill:'5・7・10を つくる', part:'ペアマグネット', color:'#ffd866', symbol:'↔', intro:'ふたつの かけらを あわせて、ぴったりの かずを つくろう。' },

      { id:'numbers', n:4, zone:0, name:'すうじの こうぼう', skill:'10までの たしざん', part:'プラスのはぐるま', color:'#a99cff', symbol:'⚙', intro:'えが なくても だいじょうぶ。すうじで そうちを うごかそう。' },
      { id:'gate', n:5, zone:1, name:'ひらめき ゲート', skill:'ここまでの まとめ', part:'あかりバッテリー', color:'#70e5b0', symbol:'▣', intro:'ゲートの チェックだよ。いろいろな もんだいが でてくるぞ。' },
      { id:'lanterns', n:6, zone:1, name:'ランタンどおり', skill:'20までを かぞえる', part:'10こケース', color:'#ffca69', symbol:'▦', intro:'10こケースを つかえば、おおきな かずも ひとめで わかる。' },
      { id:'blocks', n:7, zone:1, name:'おおきな つみきば', skill:'20までの たしざん', part:'のびるクレーン', color:'#6fc5ff', symbol:'⌁', intro:'10より おおきな つみきも、クレーンで いっしょに はこぼう。' },

    const ZONES = [
      { n:'A', name:'ひかりの きほん区', note:'みて、かぞえて、たしてみよう' },
      { n:'B', name:'そらまち こうぼう区', note:'おおきな数と 3つの数へ' },
      { n:'C', name:'おおぞら コア区', note:'ひらめきを つないで しあげよう' }

    const defaultState = () => ({
      version: 1,
      introSeen: false,
      workshopName: '',
      progress: {},
      parts: {},
      moods: {},
      settings: { sound: true, motion: true },
      stats: { totalAnswers:0, correctAnswers:0, totalSeconds:0, bestChain:0, startedAt:new Date().toISOString() },

    let state = loadState();
    let ui = { screen:'home', modal:null, openingStep: state.introSeen ? null : 0, result:null };
    let session = null;
    let audioContext = null;

    function loadState() {
      try {
        const raw = localStorage.getItem(STORE_KEY);
        if (!raw) return defaultState();
        const saved = JSON.parse(raw);
        const base = defaultState();
        return {
          ...base, ...saved,
          progress: saved.progress || {}, parts: saved.parts || {}, moods: saved.moods || {},
          settings: { ...base.settings, ...(saved.settings || {}) },
          stats: { ...base.stats, ...(saved.stats || {}) },
          history: Array.isArray(saved.history) ? saved.history.slice(-60) : []

        return defaultState();
      }
    }

    function saveState() {
      try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch (error) { /* private mode */ }
      document.body.classList.toggle('reduce-motion', !state.settings.motion);
    }

    function esc(value) {
      return String(value ?? '').replace(/[&<>'"]/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[char]));
    }
    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    function shuffle(items) {
      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i--) { const j = rand(0, i); [copy[i], copy[j]] = [copy[j], copy[i]]; }
      return copy;
    }
    function makeChoices(correct, min=0, max=20, count=4) {
      const values = new Set([correct]);
      let guard = 0;
      while (values.size < count && guard++ < 80) {
        const offset = shuffle([-3,-2,-1,1,2,3,4])[0];
        const candidate = Math.max(min, Math.min(max, correct + offset));
        values.add(candidate);
      }
      for (let n = min; values.size < count && n <= max; n++) values.add(n);
      return shuffle([...values]).slice(0, count);
    }
    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return mins ? `${mins}分${secs ? `${secs}秒` : ''}` : `${secs}秒`;
    }
    function markText(stars) {
      return [0,1,2].map(i => `<span class="${i < stars ? 'earned' : ''}">✦</span>`).join('');
    }
    function clearedCount() { return STAGES.filter(s => state.progress[s.id]?.cleared).length; }
    function totalMarks() { return STAGES.reduce((sum,s) => sum + (state.progress[s.id]?.stars || 0), 0); }
    function isUnlocked(index) { return index === 0 || !!state.progress[STAGES[index - 1].id]?.cleared; }
    function nextStageIndex() {
      const first = STAGES.findIndex((s, i) => isUnlocked(i) && !state.progress[s.id]?.cleared);
      return first >= 0 ? first : STAGES.length - 1;
    }

    function playTone(kind='tap') {
      if (!state.settings.sound) return;
      try {
        audioContext ||= new (window.AudioContext || window.webkitAudioContext)();
        const now = audioContext.currentTime;
        const notes = kind === 'good' ? [523,659,784] : kind === 'hint' ? [330,294] : kind === 'finish' ? [523,659,784,1047] : [440];
        notes.forEach((freq, index) => {
          const osc = audioContext.createOscillator();
          const gain = audioContext.createGain();
          osc.type = kind === 'hint' ? 'triangle' : 'sine';
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(.0001, now + index * .09);
          gain.gain.exponentialRampToValueAtTime(.08, now + index * .09 + .015);
          gain.gain.exponentialRampToValueAtTime(.0001, now + index * .09 + .18);
          osc.connect(gain).connect(audioContext.destination);
          osc.start(now + index * .09);
          osc.stop(now + index * .09 + .2);
        });
      } catch (error) { /* sound is optional */ }
    }

    function showToast(message) {
      const toast = document.getElementById('toast');

      clearTimeout(toastTimer);

    }

        <circle cx="61" cy="92" r="8" fill="#ff9c9a" opacity=".55"/><circle cx="132" cy="92" r="8" fill="#ff9c9a" opacity=".55"/>

    }

    function mokumoSvg(withToast=false) {
      return `<svg viewBox="0 0 190 190" role="img" aria-label="雲の整備士モクモ">

        <path d="M88 98q10 8 21 0" fill="none" stroke="#26305f" stroke-width="5" stroke-linecap="round"/>
        <path d="M48 113q-6 37 10 49M143 113q8 34-7 50" fill="none" stroke="#26305f" stroke-width="10" stroke-linecap="round"/>

    function buildQuestion(stageIndex, round) {
      if (stageIndex === 0) return questionCount(round);
      if (stageIndex === 1) return questionPair(round);
      if (stageIndex === 2) return questionPicture(round);
      if (stageIndex === 3) return questionNumber(round);
      if (stageIndex === 4) return [questionCount,questionPair,questionPicture,questionNumber][round % 4](round + 2);
      if (stageIndex === 5) return questionTwenty(round);
      if (stageIndex === 6) return questionAddTwenty(round);
      if (stageIndex === 7) return questionThree(round);
      if (stageIndex === 8) return questionCircuit(round);
      if (stageIndex === 9) return questionCarry(round);
      const finale = [questionCount,questionPair,questionNumber,questionAddTwenty,questionThree,questionCarry,questionStory,questionStory];
      return finale[round](round + 4);
    }

    function baseQuestion(data) { return { attempts:0, feedback:null, showHint:false, input:'', ...data }; }
    function questionCount(round) {
      const n = 2 + ((round * 3 + rand(0,3)) % 9);
      return baseQuestion({ kind:'choice', prompt:'ひかりつぶは なんこ？', equation:'', correct:n, answers:makeChoices(n,1,10), visual:{type:'groups', groups:[n]}, hint:'ひとつずつ ゆびで おさえながら かぞえてみよう。', explain:`ひかりつぶは ${n}こ。さいごに いった かずが、ぜんぶの かずだよ。` });
    }
    function questionPair(round) {
      const target = [5,7,10][round % 3];
      const a = rand(1,target-1), b = target-a;
      return baseQuestion({ kind:'choice', prompt:`${target}こに するには、あと いくつ？`, equation:`${a} ＋ ？ ＝ ${target}`, correct:b, answers:makeChoices(b,0,10), visual:{type:'slots', total:target, filled:a}, hint:`あいている ばしょを かぞえよう。ぜんぶで ${target}こにするよ。`, explain:`${a}と ${b}を あわせると ${target}。` });
    }
    function questionPicture(round) {
      let a = rand(1,7), b = rand(1,Math.max(1,10-a));
      const sum = a+b;
      return baseQuestion({ kind:'choice', prompt:'ふたつの にもつを あわせると？', equation:`${a} ＋ ${b} ＝ ？`, correct:sum, answers:makeChoices(sum,1,10), visual:{type:'groups', groups:[a,b]}, hint:'ひだりの まとまりから つづけて、みぎも かぞえよう。', explain:`${a}こ と ${b}こで、${sum}こ。` });
    }
    function questionNumber(round) {
      let a = rand(1,9), b = rand(0,10-a); if (b === 0 && round % 2) b = 1;
      const sum = a+b;
      return baseQuestion({ kind:round%2 ? 'input':'choice', prompt:'すうじで こたえよう', equation:`${a} ＋ ${b} ＝ ？`, correct:sum, answers:makeChoices(sum,0,10), visual:null, hint:`${a}から ${b}こぶん、かずを すすめてみよう。`, explain:`${a} ＋ ${b} ＝ ${sum}。` });
    }
    function questionTwenty(round) {
      const n = rand(11,20);
      if (round % 2 === 0) return baseQuestion({ kind:'choice', prompt:'ランタンは ぜんぶで なんこ？', equation:'', correct:n, answers:makeChoices(n,10,20), visual:{type:'tenframe', n}, hint:'ケースが いっぱいなら 10こ。そこに、そとの ぶんを たそう。', explain:`10こと ${n-10}こで、${n}こ。` });
      return baseQuestion({ kind:'input', prompt:'10こケースに そとのぶんを たそう', equation:`10 ＋ ${n-10} ＝ ？`, correct:n, answers:[], visual:{type:'tenframe', n}, hint:`10の あとに ${n-10}こ すすもう。`, explain:`10 ＋ ${n-10} ＝ ${n}。` });
    }
    function noCarryValues() {
      let a, b;
      do { a = rand(10,18); b = rand(1,9); } while (a+b > 20 || (a%10)+b >= 10);
      return [a,b];
    }
    function questionAddTwenty(round) {
      const [a,b] = noCarryValues(), sum=a+b;
      return baseQuestion({ kind:round%2 ? 'input':'choice', prompt:'クレーンに ぜんぶ のせると？', equation:`${a} ＋ ${b} ＝ ？`, correct:sum, answers:makeChoices(sum,10,20), visual:{type:'tenframe', n:a, extra:b}, hint:`${a}は 10と ${a-10}。${a-10}と ${b}を たしてから、10に もどそう。`, explain:`${a} ＋ ${b} ＝ ${sum}。` });
    }
    function threeValues() {
      let a,b,c;
      do { a=rand(1,8); b=rand(1,8); c=rand(1,8); } while (a+b+c>20);
      return [a,b,c];
    }
    function questionThree(round) {
      const [a,b,c]=threeValues(), sum=a+b+c;
      return baseQuestion({ kind:round%2 ? 'input':'choice', prompt:'3つの ざいりょうを まぜると？', equation:`${a} ＋ ${b} ＋ ${c} ＝ ？`, correct:sum, answers:makeChoices(sum,3,20), visual:{type:'groups',groups:[a,b,c]}, hint:`まず ${a}と ${b}で ${a+b}。そこに ${c}を たそう。`, explain:`${a} ＋ ${b} ＝ ${a+b}、${a+b} ＋ ${c} ＝ ${sum}。` });
    }
    function questionCircuit(round) {
      const source = [questionPicture,questionNumber,questionAddTwenty,questionThree][round%4](round+1);
      source.kind='circuit';
      source.prompt='せいかいの かいろを つなごう';
      source.answers=makeChoices(source.correct, Math.max(0,source.correct-5), Math.min(20,source.correct+5), 3);
      return source;
    }
    function carryValues() {
      const a=rand(6,9), minB=Math.max(2,11-a), b=rand(minB,9);
      return [a,b,10-a,b-(10-a)];
    }
    function questionCarry(round) {
      const [a,b,need,rest]=carryValues();
      if (round < 3) return baseQuestion({ kind:'choice', prompt:'まず 10を つくろう。あと いくつ？', equation:`${a} ＋ ？ ＝ 10`, correct:need, answers:makeChoices(need,1,9), visual:{type:'carry',a,b,need,rest,step:true}, hint:`${a}から 10まで、いくつ ひつようか かぞえよう。`, explain:`${a}に ${need}を たすと 10。${b}を ${need}と ${rest}に わけられるよ。` });
      const sum=a+b;
      return baseQuestion({ kind:round%2 ? 'input':'choice', prompt:'10を つくって こたえよう', equation:`${a} ＋ ${b} ＝ ？`, correct:sum, answers:makeChoices(sum,10,18), visual:{type:'carry',a,b,need,rest,step:false}, hint:`${b}を ${need}と ${rest}に わけよう。${a}＋${need}で 10。`, explain:`${a} ＋ ${b} ＝ 10 ＋ ${rest} ＝ ${sum}。` });
    }
    function questionStory(round) {
      const stories = [
        { thing:'あかい ねじ', other:'あおい ねじ', action:'モクモの こうぐばこに', joke:'なぜか スプーンも 1ぽん はいっていました。スプーンは かぞえません。' },
        { thing:'あさに とばした トースト', other:'ひるに とばした トースト', action:'トーストうちあげきが', joke:'ぜんぶ うえむきに とびました。そこだけは せいこうです。' },
        { thing:'きいろい くつした', other:'みどりの くつした', action:'はいたつロボが あつめたのは', joke:'どれも かたほうだけ。ロボは とくいげです。' }
      ];
      const story=stories[round%stories.length];
      const [a,b]=carryValues(), sum=a+b;
      return baseQuestion({ kind:round%2 ? 'input':'choice', prompt:`${story.action} ${story.thing}が ${a}こ、${story.other}が ${b}こ。ぜんぶで なんこ？`, equation:`${a} ＋ ${b} ＝ ？`, correct:sum, answers:makeChoices(sum,10,18), visual:{type:'story',text:story.joke}, hint:`「ぜんぶで」だから たしざん。${a}と ${b}を あわせよう。`, explain:`${a} ＋ ${b} ＝ ${sum}。ぜんぶで ${sum}こ。` });
    }

    function startStage(index) {
      if (!Number.isInteger(index) || !isUnlocked(index)) return;
      playTone('tap');
      const used = new Set(), questions=[];
      for (let round=0; round<STAGE_ROUNDS; round++) {
        let q, signature, guard=0;
        do { q=buildQuestion(index,round); signature=`${q.equation}|${q.prompt}|${q.correct}`; } while (used.has(signature) && guard++ < 18);
        used.add(signature); questions.push(q);
      }
      session = { stageIndex:index, questions, cursor:0, correct:0, combo:0, maxCombo:0, startedAt:Date.now() };
      ui.screen='game'; ui.modal=null;
      render();
    }

    function visualHtml(visual) {
      if (!visual) return '';
      if (visual.type === 'groups') {
        const colors=['#65dfde','#ff9c78','#ffd866'];
        return `<div class="visual-box"><div class="object-groups">${visual.groups.map((n,gi)=>`${gi?'<span class="object-plus">＋</span>':''}<div class="object-group" aria-label="${n}こ">${Array.from({length:n},()=>`<i class="object-dot" style="--dot-color:${colors[gi%3]}"></i>`).join('')}</div>`).join('')}</div></div>`;
      }
      if (visual.type === 'slots') return `<div class="visual-box"><div><div class="slot-grid ${visual.total>7?'wide':''}">${Array.from({length:visual.total},(_,i)=>`<i class="slot ${i<visual.filled?'filled':''}"></i>`).join('')}</div><div class="ten-label">いま ${visual.filled}こ ／ ぜんぶで ${visual.total}こ</div></div></div>`;
      if (visual.type === 'tenframe') {
        const extraShown = visual.extra || 0;
        const first = Math.min(10,visual.n), loose = Math.max(0,visual.n-10);
        return `<div class="visual-box"><div class="tenframe-wrap"><div><div class="slot-grid wide">${Array.from({length:10},(_,i)=>`<i class="slot ${i<first?'filled':''}"></i>`).join('')}</div><div class="ten-label">10こケース</div></div>${loose||extraShown?`<span class="object-plus">＋</span><div class="object-group">${Array.from({length:loose+extraShown},()=>'<i class="object-dot" style="--dot-color:#ffd866"></i>').join('')}</div>`:''}</div></div>`;
      }
      if (visual.type === 'carry') return `<div class="visual-box"><div class="carry-visual"><div class="carry-line"><div class="carry-box"><small>はじめ</small><strong>${visual.a}</strong></div><span class="carry-arrow">＋ ${visual.b}</span><div class="carry-box"><small>まず</small><strong>${visual.a} ＋ ${visual.need}</strong></div><span class="carry-arrow">→</span><div class="carry-box"><small>10と のこり</small><strong>10 ＋ ${visual.rest}</strong></div></div></div></div>`;
      if (visual.type === 'story') return `<div class="visual-box"><div class="story-strip"><div>${mokumoSvg(true)}</div><p>${esc(visual.text)}</p></div></div>`;
      return '';
    }

    function answersHtml(q) {
      if (q.feedback) return feedbackHtml(q.feedback);
      const hint = q.showHint ? `<div class="inline-hint"><strong>トトの ヒント：</strong>${esc(q.hint)}</div>` : '';
      if (q.kind === 'input') return `${hint}<div class="answers"><div class="number-display ${q.input ? '' : 'empty'}" aria-live="polite">${q.input || 'こたえを いれてね'}</div><div class="keypad">${[1,2,3,4,5,6,7,8,9,0].map(n=>`<button data-key="${n}">${n}</button>`).join('')}<button data-key="back" aria-label="ひとつけす">←</button><button class="submit-key" data-action="submit-input">こたえる</button></div></div>`;
      if (q.kind === 'circuit') return `${hint}<div class="answers circuit-grid">${q.answers.map(a=>`<button class="circuit-button" data-answer="${a}"><span class="circuit-node"></span><span class="circuit-wire"></span><strong>${a}</strong></button>`).join('')}</div>`;
      return `${hint}<div class="answers answer-grid">${q.answers.map(a=>`<button class="answer-button" data-answer="${a}">${a}</button>`).join('')}</div>`;
    }

    function feedbackHtml(feedback) {
      const action = feedback.action === 'retry' ? 'retry-question' : 'next-question';
      const label = feedback.action === 'retry' ? 'ヒントをみて もういちど' : 'つぎへ';
      return `<div class="feedback-card ${feedback.kind}" role="status"><h2>${esc(feedback.title)}</h2><p>${esc(feedback.body)}</p><button data-action="${action}">${label} →</button></div>`;
    }

    function renderGame() {
      if (!session) { ui.screen='map'; return renderMap(); }
      const stage=STAGES[session.stageIndex], q=session.questions[session.cursor];
      const completed=session.cursor+(q.feedback&&q.feedback.action==='next'?1:0);
      const energy=completed/STAGE_ROUNDS;
      return `<main class="screen game-shell" style="--stage-color:${stage.color}">
        <div class="mission-head">
          <div class="mission-title"><small>REPAIR ${stage.n} / 11</small><strong>${stage.name}</strong></div>
          <div class="charge-wrap"><span class="charge-label">あかり</span><div class="charge-track"><div class="charge-fill" style="width:${energy*100}%"></div></div><div class="mission-dots">${Array.from({length:STAGE_ROUNDS},(_,i)=>`<i class="${i<session.cursor?'done':i===session.cursor?'now':''}"></i>`).join('')}</div></div>
          <button class="quit-button" data-action="quit" aria-label="ステージをやめる">×</button>
        </div>
        <div class="game-layout">
          <section class="repair-stage">
            <div class="machine-scene">${machineSvg(session.stageIndex,energy)}</div>
            <div class="repair-character">${totoSvg(q.feedback?.kind==='hint'?'thinking':'happy')}</div>
            <div class="repair-status">${q.feedback ? (q.feedback.kind==='hint' ? 'だいじょうぶ。見かたを ひとつ かえてみよう。' : 'ひらめきの あかりが、そうちへ とどいた！') : stage.intro}<div class="chain-badge">✦ ひらめきチェーン ${session.combo}</div></div>
          </section>
          <section class="question-panel">
            <div class="question-count">MISSION ${session.cursor+1} / ${STAGE_ROUNDS}</div>
            <h1>${esc(q.prompt)}</h1>
            ${q.equation ? `<div class="equation">${esc(q.equation)}</div>` : ''}
            ${visualHtml(q.visual)}
            ${answersHtml(q)}
          </section>
        </div>
        ${renderOverlay()}
      </main>`;
    }

    function handleAnswer(value) {
      if (!session) return;
      const q=session.questions[session.cursor];
      if (q.feedback || value === '' || value === null || value === undefined) return;
      const numeric=Number(value);
      if (!Number.isFinite(numeric)) return;
      const first=q.attempts===0, correct=numeric===q.correct;
      q.attempts++;
      state.stats.totalAnswers++;
      if (correct) state.stats.correctAnswers++;
      if (correct && first) {
        session.correct++;
        session.combo++;
        session.maxCombo=Math.max(session.maxCombo,session.combo);
        q.feedback={kind:'correct',title:session.combo>=3?`${session.combo}れんぞく！`:'せいかい！',body:q.explain,action:'next'};
        playTone('good');
      } else if (correct) {
        q.feedback={kind:'recovered',title:'ひらめいた！',body:q.explain,action:'next'};
        playTone('good');
      } else if (first) {
        session.combo=0;
        q.feedback={kind:'hint',title:'おしい！ ここを みよう',body:q.hint,action:'retry'};
        playTone('hint');
      } else {
        session.combo=0;
        q.feedback={kind:'miss',title:'いっしょに たしかめよう',body:`こたえは ${q.correct}。${q.explain}`,action:'next'};
        playTone('hint');
      }
      render();
    }

    function nextQuestion() {
      if (!session) return;
      if (session.cursor >= STAGE_ROUNDS-1) return finishStage();
      session.cursor++;
      render();
    }

    function finishStage() {
      const stage=STAGES[session.stageIndex], elapsed=Math.max(1,Math.round((Date.now()-session.startedAt)/1000));
      const score=session.correct, cleared=score>=5, stars=score===8?3:score>=7?2:score>=5?1:0;
      const old=state.progress[stage.id] || {attempts:0,bestScore:0,stars:0,seconds:0};
      const firstClear=cleared&&!old.cleared;
      state.progress[stage.id]={...old,attempts:(old.attempts||0)+1,bestScore:Math.max(old.bestScore||0,score),lastScore:score,stars:Math.max(old.stars||0,stars),cleared:!!old.cleared||cleared,seconds:(old.seconds||0)+elapsed,lastPlayed:new Date().toISOString()};
      if (cleared) state.parts[stage.id]=true;
      state.stats.totalSeconds+=elapsed;
      state.stats.bestChain=Math.max(state.stats.bestChain||0,session.maxCombo);
      state.history.push({stage:stage.id,score,stars,cleared,seconds:elapsed,at:new Date().toISOString()});
      state.history=state.history.slice(-60);
      ui.result={stageIndex:session.stageIndex,score,stars,cleared,elapsed,firstClear,maxCombo:session.maxCombo};
      session=null; ui.screen='result';
      saveState();
      playTone(cleared?'finish':'hint');
      render();
    }

    function renderResult() {
      if (!ui.result) { ui.screen='home'; return renderHome(); }
      const r=ui.result, stage=STAGES[r.stageIndex];
      const next=r.stageIndex+1;
      return `<main class="screen">
        ${header()}
        <div class="result-wrap"><section class="result-card">
          <div class="result-burst">${r.cleared?totoSvg('happy'):totoSvg('thinking')}</div>
          <div class="eyebrow">REPAIR REPORT</div>
          <h1>${r.cleared?'しゅうり かんりょう！':'あと ひとひらめき！'}</h1>
          <p>${r.cleared?`${stage.name}に あかりが もどりました。`:'5もん正解すると そうちが うごくよ。ヒントを使って、もう一度ためしてみよう。'}</p>
          <div class="marks-large">${markText(r.stars)}</div>
          <div class="score-row"><div class="score-box"><strong>${r.score} / 8</strong><small>さいしょに正解</small></div><div class="score-box"><strong>${r.maxCombo}</strong><small>ベストチェーン</small></div><div class="score-box"><strong>${formatTime(r.elapsed)}</strong><small>かかった時間</small></div></div>
          ${r.cleared?`<div class="part-reward"><span class="part-symbol">${stage.symbol}</span><div><small>${r.firstClear?'あたらしい しゅうりパーツ':'こうぼうに あるパーツ'}</small><strong>${stage.part}</strong></div></div>`:''}
          <div class="mood-prompt"><p>きょうの しゅうりは どうだった？</p><div class="mood-buttons">${[['fun','たのしかった'],['hard','ちょっと むずかしい'],['again','もういちど やりたい']].map(([key,label])=>`<button class="${state.moods[stage.id]===key?'selected':''}" data-mood="${key}">${label}</button>`).join('')}</div></div>
          <div class="result-actions"><button class="secondary-button" data-nav="map">せっけいずへ</button>${r.cleared&&next<STAGES.length?`<button class="primary-button" data-stage="${next}">つぎの しゅうりへ →</button>`:`<button class="primary-button" data-stage="${r.stageIndex}">もういちど</button>`}</div>
        </section></div>
        ${renderOverlay()}
      </main>`;
    }

    function renderAtelier() {
      const count=clearedCount();
      return `<main class="screen">
        ${header('atelier')}
        <div class="page-heading"><div class="eyebrow">WORKSHOP ARCHIVE</div><h1>こうぼう ずかん</h1><p>あつめたパーツが、ひとつの「そらまち再起動装置」になっていきます。</p></div>
        <div class="atelier-layout">
          <section class="assembly-card"><h2>${esc(state.workshopName||'ひらめき')}工房の せっけいず</h2><p>${count===11?'すべてのパーツがつながりました。ルミナは今日も明るく動いています。':`あと ${11-count}このパーツで かんせい。`}</p>${assemblySvg()}</section>
          <aside class="parts-panel"><h2>しゅうりパーツ ${count} / 11</h2><div class="part-list">${STAGES.map((stage,index)=>{const on=!!state.parts[stage.id];return `<div class="part-item ${on?'on':''}"><span class="part-mini">${on?stage.symbol:'?'}</span><span><b>${on?stage.part:'まだ みつかっていない'}</b><br><small>${stage.n}. ${stage.name}</small></span><span>${on?'✓':'·'}</span></div>`}).join('')}</div></aside>
        </div>
        ${renderOverlay()}
      </main>`;
    }

    function renderParent() {
      const attempts=Object.values(state.progress).reduce((n,p)=>n+(p.attempts||0),0);
      const accuracy=state.stats.totalAnswers?Math.round(state.stats.correctAnswers/state.stats.totalAnswers*100):0;
      return `<main class="screen">
        ${header('parent')}
        <section class="parent-card">
          <div class="page-heading"><div class="eyebrow">FOR FAMILY</div><h1>おうちの人へ</h1><p>${esc(state.workshopName||'ひらめき')}工房の、この端末での学習記録です。</p></div>
          <div class="metric-grid"><div class="metric"><strong>${clearedCount()} / 11</strong><small>修理完了</small></div><div class="metric"><strong>${attempts}</strong><small>ステージ挑戦</small></div><div class="metric"><strong>${accuracy}%</strong><small>全回答の正答率</small></div><div class="metric"><strong>${formatTime(state.stats.totalSeconds||0)}</strong><small>プレイ時間</small></div></div>
          <h2>ステージ別</h2>
          <div style="overflow:auto"><table class="progress-table"><thead><tr><th>ステージ</th><th>学習内容</th><th>最高</th><th>挑戦</th><th>状態</th></tr></thead><tbody>${STAGES.map(stage=>{const p=state.progress[stage.id]||{};return `<tr><td>${stage.n}. ${stage.name}</td><td>${stage.skill}</td><td>${p.bestScore??'—'}${p.bestScore!==undefined?' / 8':''}</td><td>${p.attempts||0}回</td><td>${p.cleared?'完了':'—'}</td></tr>`}).join('')}</tbody></table></div>
          <div class="parent-note"><strong>記録の見方</strong><br>「最高」は最初の回答で正解できた問題数です。まちがえた後も具体的なヒントを出し、同じ問題でもう一度考えられるようにしています。正答率は再回答も含みます。記録はこの端末の中だけに保存され、外部へ送信されません。</div>
          <div class="parent-actions"><button class="secondary-button" data-action="export">記録をファイルに保存</button><button class="danger-button" data-action="reset-confirm">進みぐあいをリセット</button></div>
        </section>
        ${renderOverlay()}
      </main>`;
    }

    function renderOpening() {
      if (ui.openingStep === null) return '';
      const scenes=[
        {speaker:'トト',char:totoSvg('thinking'),text:'あっ……ルミナの あかりが ぜんぶ きえてる！ さっきまで まちが ぴかぴか だったのに。'},
        {speaker:'モクモ',char:mokumoSvg(true),text:'「なおすボタン」を おしたんだ。でも なおったのは、ぼくの あたまの トーストだけだった。'},
        {speaker:'トト',char:totoSvg('happy'),text:'だいじょうぶ。かんがえると うまれる「あかり」で、11この そうちを つなぎなおそう！'}
      ];
      if (ui.openingStep < 3) {
        const scene=scenes[ui.openingStep];
        return `<div class="overlay"><section class="opening-card"><div class="opening-character">${scene.char}</div><div class="opening-copy"><div class="speaker">${scene.speaker}</div><h2>${scene.text}</h2><button class="primary-button" data-action="opening-next">つぎへ →</button></div></section></div>`;
      }
      return `<div class="overlay"><section class="opening-card"><div class="opening-character">${totoSvg('happy')}</div><div class="opening-copy"><div class="speaker">YOUR WORKSHOP</div><h2>きみの こうぼうに<br>なまえを つけよう。</h2><label class="sr-only" for="workshopNameInput">工房の名前</label><input id="workshopNameInput" class="name-input" maxlength="8" placeholder="ひらめき" autocomplete="off"><div class="name-help">8もじまで。「こうぼう」は あとから つくよ。</div><button class="primary-button wide" data-action="finish-opening">この なまえで はじめる</button></div></section></div>`;
    }

    function renderOverlay() {
      if (ui.openingStep !== null) return renderOpening();
      if (!ui.modal) return '';
      if (ui.modal === 'settings') return `<div class="overlay"><section class="modal-card" role="dialog" aria-modal="true" aria-label="せってい"><h2>せってい</h2><div class="setting-row"><span>おと</span><button class="toggle ${state.settings.sound?'on':''}" data-action="toggle-sound">${state.settings.sound?'オン':'オフ'}</button></div><div class="setting-row"><span>うごき</span><button class="toggle ${state.settings.motion?'on':''}" data-action="toggle-motion">${state.settings.motion?'オン':'オフ'}</button></div><div class="setting-row" style="display:block;padding:14px 0"><label for="renameInput">こうぼうの なまえ</label><input id="renameInput" class="name-input" maxlength="8" value="${esc(state.workshopName)}" style="margin-top:8px"></div><div class="modal-actions"><button class="soft-button" data-action="close-modal">とじる</button><button class="primary-button" data-action="save-settings">ほぞん</button></div></section></div>`;
      if (ui.modal === 'quit') return `<div class="overlay"><section class="modal-card" role="dialog" aria-modal="true"><h2>しゅうりを ちゅうだんする？</h2><p>いまのステージの記録は残りません。設計図から、また最初の問題に挑戦できます。</p><div class="modal-actions"><button class="soft-button" data-action="close-modal">つづける</button><button class="danger-button" data-action="quit-stage">せっけいずへ</button></div></section></div>`;
      if (ui.modal === 'parent') return `<div class="overlay"><section class="modal-card" role="dialog" aria-modal="true"><h2>おうちの人へ</h2><p>ここからは、学習時間や正答率などの記録を表示します。お子さまと一緒に見てください。</p><div class="modal-actions"><button class="soft-button" data-action="close-modal">もどる</button><button class="primary-button" data-action="parent-enter">記録をみる</button></div></section></div>`;
      if (ui.modal === 'reset') return `<div class="overlay"><section class="modal-card" role="dialog" aria-modal="true"><h2>進みぐあいをリセット</h2><p>ステージの結果、集めたパーツ、プレイ時間をこの端末から消します。この操作は元に戻せません。</p><div class="modal-actions"><button class="soft-button" data-action="close-modal">やめる</button><button class="danger-button" data-action="reset-all">すべて消す</button></div></section></div>`;
      return '';
    }

    function render() {
      document.body.classList.toggle('reduce-motion', !state.settings.motion);
      const app=document.getElementById('app');
      const screens={home:renderHome,map:renderMap,game:renderGame,result:renderResult,atelier:renderAtelier,parent:renderParent};
      app.innerHTML=(screens[ui.screen]||renderHome)();
      window.scrollTo(0, 0);
      requestAnimationFrame(()=>{
        const dialog=document.querySelector('.overlay button, .overlay input');
        if (dialog) dialog.focus({preventScroll:true});
      });
    }

    function navigate(screen) {
      playTone('tap');
      session=screen==='game'?session:null;
      ui.screen=screen; ui.modal=null;
      render();
    }

    function exportData() {
      const payload={title:'ひらめき工房と そらのまち',workshopName:state.workshopName,exportedAt:new Date().toISOString(),progress:state.progress,stats:state.stats,history:state.history};
      const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
      const url=URL.createObjectURL(blob), a=document.createElement('a');
      a.href=url; a.download=`hirameki-koubou-${new Date().toISOString().slice(0,10)}.json`; a.click();
      setTimeout(()=>URL.revokeObjectURL(url),1000);
      showToast('きろくを 保存しました');
    }

    document.getElementById('app').addEventListener('click', event => {
      const nav=event.target.closest('[data-nav]');
      if (nav) return navigate(nav.dataset.nav);
      const stageButton=event.target.closest('[data-stage]');
      if (stageButton && !stageButton.disabled) {
        const index=Number(stageButton.dataset.stage);
        return ui.screen==='home' && clearedCount()===STAGES.length ? navigate('map') : startStage(index);
      }
      const answer=event.target.closest('[data-answer]');
      if (answer) return handleAnswer(answer.dataset.answer);
      const key=event.target.closest('[data-key]');
      if (key && session) {
        const q=session.questions[session.cursor];
        if (q.feedback || q.kind!=='input') return;
        if (key.dataset.key==='back') q.input=q.input.slice(0,-1);
        else if (q.input.length<2) q.input+=key.dataset.key;
        playTone('tap'); render(); return;
      }
      const mood=event.target.closest('[data-mood]');
      if (mood && ui.result) { state.moods[STAGES[ui.result.stageIndex].id]=mood.dataset.mood; saveState(); render(); return; }
      const action=event.target.closest('[data-action]')?.dataset.action;
      if (!action) return;
      if (action==='settings') { ui.modal='settings'; render(); }
      else if (action==='close-modal') { ui.modal=null; render(); }
      else if (action==='toggle-sound') { state.settings.sound=!state.settings.sound; saveState(); if(state.settings.sound)playTone('good'); render(); }
      else if (action==='toggle-motion') { state.settings.motion=!state.settings.motion; saveState(); render(); }
      else if (action==='save-settings') { const input=document.getElementById('renameInput'); state.workshopName=(input?.value.trim()||'ひらめき').slice(0,8); saveState(); ui.modal=null; showToast('せっていを 保存しました'); render(); }
      else if (action==='quit') { ui.modal='quit'; render(); }
      else if (action==='quit-stage') { session=null; ui.screen='map'; ui.modal=null; render(); }
      else if (action==='retry-question') { const q=session?.questions[session.cursor]; if(q){q.feedback=null;q.showHint=true;q.input='';render();} }
      else if (action==='next-question') nextQuestion();
      else if (action==='submit-input') { const q=session?.questions[session.cursor]; if(q?.input)handleAnswer(q.input); else showToast('こたえを いれてね'); }
      else if (action==='opening-next') { ui.openingStep++; playTone('tap'); render(); }
      else if (action==='finish-opening') { const input=document.getElementById('workshopNameInput'); state.workshopName=(input?.value.trim()||'ひらめき').slice(0,8); state.introSeen=true; ui.openingStep=null; saveState(); playTone('finish'); render(); showToast(`${state.workshopName}工房、オープン！`); }
      else if (action==='parent-intro') { ui.modal='parent'; render(); }
      else if (action==='parent-enter') { ui.modal=null; ui.screen='parent'; render(); }
      else if (action==='reset-confirm') { ui.modal='reset'; render(); }
      else if (action==='reset-all') { localStorage.removeItem(STORE_KEY); state=defaultState(); ui={screen:'home',modal:null,openingStep:0,result:null}; session=null; render(); showToast('進みぐあいを リセットしました'); }
      else if (action==='export') exportData();
    });

    window.addEventListener('keydown', event => {
      if (ui.openingStep===3 && event.key==='Enter') { document.querySelector('[data-action="finish-opening"]')?.click(); return; }
      if (!session || ui.screen!=='game' || ui.modal) return;
      const q=session.questions[session.cursor];
      if (q.feedback) { if(event.key==='Enter')document.querySelector('.feedback-card button')?.click(); return; }
      if (q.kind==='input') {
        if (/^[0-9]$/.test(event.key) && q.input.length<2) { q.input+=event.key; render(); }
        else if (event.key==='Backspace') { q.input=q.input.slice(0,-1); render(); }
        else if (event.key==='Enter' && q.input) handleAnswer(q.input);
      }
      if (event.key==='Escape') { ui.modal='quit'; render(); }
    });

    saveState();
    render();
    if ('serviceWorker' in navigator && location.protocol !== 'file:') {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
    }
